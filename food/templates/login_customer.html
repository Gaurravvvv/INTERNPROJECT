{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Customer Login</h2>
        <p class="auth-subtitle">Login to order delicious home food.</p>

        <form method="POST" action="{{ url_for('login_customer') }}" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@domain.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Sign In as Customer</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Join the family</a>
        </p>
    </div>
</div>
{% endblock %}

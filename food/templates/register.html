{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="max-width: 500px">
    <div class="auth-card">
        <h2 class="auth-title">Join FreshBite</h2>
        <p class="auth-subtitle">Get hot, home-cooked food delivered to your door.</p>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Name</label>
                <input type="text" id="username" name="username" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="address">Delivery Address</label>
                <textarea id="address" name="address" required placeholder="123 Food Street, Apt 4B..."></textarea>
            </div>

            <div class="form-group">
                <label>I want to:</label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="radio" name="role" value="customer" checked required> Order Food
                    </label>
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="radio" name="role" value="admin" required> Sell Food
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Create Account & Get OTP</button>
        </form>

        <p class="auth-footer">
            Already registered? <a href="{{ url_for('login') }}">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}

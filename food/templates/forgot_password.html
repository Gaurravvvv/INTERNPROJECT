{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Forgot Password</h2>
        <p class="auth-subtitle">Enter your email to receive a password reset link.</p>

        <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@domain.com">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Send Reset Link</button>
        </form>

        <p class="auth-footer">
            Remembered your password? <a href="{{ url_for('login') }}">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>Complete Your Profile</h2>
    <p>We need a few more details before you can start.</p>
    <form method="POST" action="{{ url_for('profile_setup') }}">
        
        {% if current_user.get('role') == 'seller' %}
        <div class="form-group">
            <label for="restaurant_name">Restaurant Name</label>
            <input type="text" id="restaurant_name" name="restaurant_name" required>
        </div>
        <!-- Note: user requested "price, image" for profile, but MVP forms can accept image link -->
        <div class="form-group">
            <label for="image">Cover Image URL</label>
            <input type="url" id="image" name="image" placeholder="https://unsplash.com/...">
        </div>
        <div class="form-group">
            <label for="address">Restaurant Address</label>
            <input type="text" id="address" name="address" required>
        </div>

        {% else %}
        
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>
        <div class="form-group">
            <label for="address">Delivery Address</label>
            <textarea id="address" name="address" rows="3" required></textarea>
        </div>
        
        {% endif %}

        <button type="submit" class="btn-primary w-100">Save Profile</button>
    </form>
</div>
{% endblock %}

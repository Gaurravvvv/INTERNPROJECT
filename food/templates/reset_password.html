{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Enter your new password below for {{ email }}.</p>

        <form method="POST" action="{{ url_for('reset_password', email=email) }}" class="auth-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Reset My Password</button>
        </form>
    </div>
</div>
{% endblock %}
